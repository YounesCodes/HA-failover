# App service (deploy as its OWN Dokploy Compose service, e.g. named "app").
# Connects to the db service on the same host via host-gateway:
#   Postgres -> host.docker.internal:5432   (the "db" service, Patroni leader)

name: ha-app

services:
  app:
    build: ./app
    restart: unless-stopped
    environment:
      PGHOST: host.docker.internal
      PGPORT: "5432"
      PGUSER: ${PG_SUPERUSER}
      PGPASSWORD: ${PG_SUPERUSER_PASSWORD}
      PGDATABASE: postgres
      REGION: ${REGION}
      NODE_NAME: ${PATRONI_NAME}
      PORT: "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
