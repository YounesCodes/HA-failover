# App service (deploy as its OWN Dokploy Compose service, e.g. named "app").
# Connects to the db + redis services on the same host via host-gateway:
#   Postgres -> host.docker.internal:5432   (the "db" service, Patroni leader)
#   Redis    -> host.docker.internal:6379   (the "redis" service)

name: ha-app

services:
  app:
    build: ./app
    restart: unless-stopped
    environment:
      PGHOST: host.docker.internal
      PGPORT: "5432"
      PGUSER: ${PG_SUPERUSER}
      PGPASSWORD: ${PG_SUPERUSER_PASSWORD}
      PGDATABASE: postgres
      REDIS_URL: redis://host.docker.internal:6379
      REGION: ${REGION}
      NODE_NAME: ${PATRONI_NAME}
      PORT: "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
