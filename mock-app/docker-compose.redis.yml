# Redis service (deploy as its OWN Dokploy Compose service, e.g. named "redis").
# Host-networked so the "app" service reaches it at host-gateway:6379.
# (This is a plain Redis Compose service; Dokploy's built-in Redis *resource* is
#  an alternative — see README "Using the built-in Dokploy Redis resource".)

name: ha-redis

services:
  redis:
    image: redis:7-alpine
    network_mode: host
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /data/redis:/data
