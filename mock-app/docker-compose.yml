# Per-app-server stack: CRUD to-do app + Postgres(Patroni) + Redis + etcd member.
# Deploy the SAME bundle to every app server (app-a1..3, app-b1..3); only the
# .env differs per node. The witness runs etcd alone (docker-compose.witness.yml).
#
# Networking: etcd + Postgres/Patroni use host networking so they bind the
# Tailscale interface and talk cross-region. NODE_MESH_IP holds this node's
# Tailscale MagicDNS name (e.g. "app-a1") so peers resolve it without knowing
# IPs at boot. The app + Redis stay on the compose bridge; the app reaches
# Postgres via host-gateway.

name: ha-mock

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.31
    network_mode: host
    restart: unless-stopped
    environment:
      ETCD_NAME: ${ETCD_NAME}
      ETCD_DATA_DIR: /etcd-data
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://${NODE_MESH_IP}:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://${NODE_MESH_IP}:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_INITIAL_CLUSTER: ${ETCD_INITIAL_CLUSTER}
      ETCD_INITIAL_CLUSTER_STATE: ${ETCD_INITIAL_CLUSTER_STATE}
      ETCD_INITIAL_CLUSTER_TOKEN: ${ETCD_TOKEN}
    volumes:
      - /data/etcd:/etcd-data

  postgres:
    build: ./patroni
    network_mode: host
    restart: unless-stopped
    depends_on:
      - etcd
    environment:
      PATRONI_SCOPE: ${PATRONI_SCOPE}
      PATRONI_NAME: ${PATRONI_NAME}
      NODE_MESH_IP: ${NODE_MESH_IP}
      ETCD3_HOSTS: ${ETCD3_HOSTS}
      PATRONI_POSTGRESQL_DATA_DIR: /data/pgdata
      PG_SUPERUSER: ${PG_SUPERUSER}
      PG_SUPERUSER_PASSWORD: ${PG_SUPERUSER_PASSWORD}
      PG_REPL_USER: ${PG_REPL_USER}
      PG_REPL_PASSWORD: ${PG_REPL_PASSWORD}
    volumes:
      - /data:/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /data/redis:/data

  app:
    build: ./app
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      PGHOST: host.docker.internal
      PGPORT: "5432"
      PGUSER: ${PG_SUPERUSER}
      PGPASSWORD: ${PG_SUPERUSER_PASSWORD}
      PGDATABASE: postgres
      REDIS_URL: redis://redis:6379
      REGION: ${REGION}
      NODE_NAME: ${PATRONI_NAME}
      PORT: "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # 8080 avoids Dokploy's Traefik (80/443) and UI (3000). Route 53 health
      # checks + browser access target http://<eip>:8080.
      - "8080:8080"
